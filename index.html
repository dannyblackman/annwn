<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annwn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sage-lighter: #EEF1EC;
      --sage-50: #F4F6F3;
      --mint: #7BF5A0;
      --lavender: #B8A9E8;
      --charcoal: #1E1E2A;
      --dark-gray: #4A4A5A;
      --mid-gray: #8A8A96;
      --display: 'Space Grotesk', system-ui, sans-serif;
      --body: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body);
      background: var(--sage-50);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      padding: 80px 32px;
    }
    .logo {
      height: 40px;
      filter: brightness(0);
      margin-bottom: 48px;
    }
    h1 {
      font-family: var(--display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
      color: var(--charcoal);
    }
    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: var(--display);
      font-weight: 500;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .link-brand {
      background: var(--charcoal);
      color: white;
    }
    .link-brand:hover {
      background: #2D2D3D;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(30,30,42,0.2);
    }
    .link-deck {
      background: var(--mint);
      color: var(--charcoal);
    }
    .link-deck:hover {
      background: #6ae090;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(123,245,160,0.3);
    }
    .footer {
      margin-top: 64px;
      font-size: 12px;
      color: var(--mid-gray);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://annwn.ai/annwn_transparent_white.png" alt="annwn" class="logo">
    <h1>The AI operating system for sustainability consultants</h1>
    <div class="links">
      <a href="brand-guidelines.html" class="link-brand">Brand Guidelines</a>
      <a href="deck.html" class="link-deck">Investment Deck</a>
    </div>
    <p class="footer">Confidential and Proprietary. Copyright &copy; 2026 annwn. All Rights Reserved.</p>
  </div>
</body>
</html>
